name: Windows Desktop Agent Build

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "Optional backend API base URL to bake into the desktop app. Leave blank to use the repository/cloud default."
        required: false
        type: string
      release_channel:
        description: "Artifact channel label"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - pilot
          - stable
      allow_unsigned_preview:
        description: "Allow an unsigned installer for internal preview/pilot testing. Stable releases still require signing."
        required: true
        default: true
        type: boolean
  push:
    tags:
      - "desktop-v*"

jobs:
  build-windows-desktop:
    name: Build Windows desktop agent
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    env:
      DESKTOP_API_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.api_base_url || vars.AUTOMATOR_DESKTOP_API_BASE_URL || 'https://api.smartsystema.online/api' }}
      DESKTOP_RELEASE_CHANNEL: ${{ github.event_name == 'workflow_dispatch' && inputs.release_channel || 'preview' }}
      ALLOW_UNSIGNED_PREVIEW: ${{ github.event_name != 'workflow_dispatch' || inputs.allow_unsigned_preview }}
      WINDOWS_SIGN_COMMAND_CONFIGURED: ${{ secrets.TAURI_WINDOWS_SIGN_COMMAND != '' }}
      WINDOWS_CERTIFICATE_THUMBPRINT_CONFIGURED: ${{ secrets.TAURI_WINDOWS_CERTIFICATE_THUMBPRINT != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.13.1 --activate
          pnpm --version

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.88.0 --profile minimal --component rustfmt --component clippy
          rustup default 1.88.0
          rustc --version
          cargo --version

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Windows release policy
        run: |
          $hasSigning = "${env:WINDOWS_SIGN_COMMAND_CONFIGURED}" -eq "true" -or "${env:WINDOWS_CERTIFICATE_THUMBPRINT_CONFIGURED}" -eq "true"

          if ("${env:DESKTOP_RELEASE_CHANNEL}" -eq "stable" -and -not $hasSigning) {
            throw "Stable Windows releases require Authenticode signing. Configure TAURI_WINDOWS_SIGN_COMMAND or TAURI_WINDOWS_CERTIFICATE_THUMBPRINT."
          }

          if ("${env:DESKTOP_RELEASE_CHANNEL}" -ne "stable" -and "${env:ALLOW_UNSIGNED_PREVIEW}" -ne "true" -and -not $hasSigning) {
            throw "Unsigned preview/pilot installers are disabled for this run. Configure signing or enable allow_unsigned_preview."
          }

          if ($hasSigning) {
            Write-Host "Windows signing is configured for this run."
          } else {
            Write-Host "No Windows signing configured. This run can only produce an internal unsigned preview/pilot installer."
          }

      - name: Typecheck workspace
        run: pnpm typecheck

      - name: Test workspace
        run: pnpm test

      - name: Build Windows installer
        env:
          TAURI_WINDOWS_SIGN_COMMAND: ${{ secrets.TAURI_WINDOWS_SIGN_COMMAND }}
          TAURI_WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.TAURI_WINDOWS_CERTIFICATE_THUMBPRINT }}
        run: |
          $env:PATH = "${env:ProgramFiles(x86)}\NSIS;$env:PATH"
          $apiBaseUrl = "${env:DESKTOP_API_BASE_URL}".Trim()
          $tauriConfigArgs = @()
          $signCommand = "${env:TAURI_WINDOWS_SIGN_COMMAND}".Trim()
          $certificateThumbprint = "${env:TAURI_WINDOWS_CERTIFICATE_THUMBPRINT}".Trim()

          if (-not [string]::IsNullOrWhiteSpace($signCommand) -or -not [string]::IsNullOrWhiteSpace($certificateThumbprint)) {
            $windowsSigningConfig = @{}

            if (-not [string]::IsNullOrWhiteSpace($signCommand)) {
              $windowsSigningConfig.signCommand = $signCommand
            }

            if (-not [string]::IsNullOrWhiteSpace($certificateThumbprint)) {
              $windowsSigningConfig.certificateThumbprint = $certificateThumbprint
            }

            $signingConfig = @{
              bundle = @{
                windows = $windowsSigningConfig
              }
            }

            $signingConfigPath = "apps/desktop/src-tauri/tauri.windows-signing.generated.json"
            $signingConfig | ConvertTo-Json -Depth 10 | Set-Content -Path $signingConfigPath -Encoding utf8NoBOM
            $tauriConfigArgs = @("--config", $signingConfigPath)
          }

          if ([string]::IsNullOrWhiteSpace($apiBaseUrl)) {
            Write-Host "DESKTOP_API_BASE_URL is empty; the desktop app will ask for a self-hosted backend URL at runtime."
            $env:VITE_API_BASE_URL = ""
            pnpm --filter @automator/desktop tauri build --ci --bundles nsis @tauriConfigArgs
            exit 0
          }

          try {
            $apiUri = [System.Uri]::new($apiBaseUrl)
          } catch {
            throw "DESKTOP_API_BASE_URL must be an absolute HTTP or HTTPS URL."
          }

          if (-not $apiUri.IsAbsoluteUri -or ($apiUri.Scheme -ne "http" -and $apiUri.Scheme -ne "https")) {
            throw "DESKTOP_API_BASE_URL must use http or https."
          }

          if ($apiUri.Scheme -eq "http" -and $apiUri.Host -ne "localhost" -and $apiUri.Host -ne "127.0.0.1") {
            throw "HTTP backend URLs are allowed only for localhost/127.0.0.1. Use HTTPS for server or LAN self-hosted deployments."
          }

          if (-not [string]::IsNullOrWhiteSpace($apiUri.UserInfo)) {
            throw "DESKTOP_API_BASE_URL must not contain embedded credentials."
          }

          if ($apiUri.Query -match "(?i)(access_token|api[_-]?key|password|refresh_token|secret|token)=") {
            throw "DESKTOP_API_BASE_URL must not contain secret-like query parameters."
          }

          $env:VITE_API_BASE_URL = $apiBaseUrl.TrimEnd("/")
          pnpm --filter @automator/desktop tauri build --ci --bundles nsis @tauriConfigArgs

      - name: Stage Windows artifacts
        run: |
          $artifactDir = "dist/windows-installer"
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null
          $config = Get-Content "apps/desktop/src-tauri/tauri.conf.json" | ConvertFrom-Json
          $version = $config.version
          $installerName = "SmartSistema-Setup-$version-${env:DESKTOP_RELEASE_CHANNEL}-${env:GITHUB_RUN_NUMBER}.exe"
          $expectedBinary = "apps/desktop/src-tauri/target/release/SmartSistema.exe"

          if (-not (Test-Path $expectedBinary)) {
            throw "Expected application binary was not produced at $expectedBinary. The Windows app binary must be SmartSistema.exe."
          }

          $legacyBinary = "apps/desktop/src-tauri/target/release/Automator-Agent.exe"
          if (Test-Path $legacyBinary) {
            throw "Legacy Automator-Agent.exe was produced. Check Tauri productName/mainBinaryName before publishing."
          }

          $nsisDir = "apps/desktop/src-tauri/target/release/bundle/nsis"
          if (-not (Test-Path $nsisDir)) {
            throw "NSIS bundle directory was not produced."
          }

          $installer = Get-ChildItem $nsisDir -Filter "*.exe" |
            Sort-Object LastWriteTimeUtc -Descending |
            Select-Object -First 1

          if ($null -eq $installer) {
            throw "No NSIS installer artifact was produced."
          }

          Copy-Item -Path $installer.FullName -Destination (Join-Path $artifactDir $installerName)

          $artifacts = @(Get-ChildItem $artifactDir -Filter "*.exe")
          if ($artifacts.Count -ne 1) {
            throw "Exactly one Windows installer artifact must be staged. Found $($artifacts.Count)."
          }

          if ($artifacts[0].Name -notlike "SmartSistema-Setup-*.exe") {
            throw "Installer artifact must be named SmartSistema-Setup-*.exe."
          }

          $artifacts | Select-Object Name, Length | Format-Table -AutoSize
          Get-FileHash $artifacts[0].FullName -Algorithm SHA256 | Format-List

      - name: Write Windows artifact summary
        run: |
          $artifactDir = "dist/windows-installer"
          Add-Content $env:GITHUB_STEP_SUMMARY "## Windows desktop artifact"
          Add-Content $env:GITHUB_STEP_SUMMARY ""
          Add-Content $env:GITHUB_STEP_SUMMARY "- Channel: `${env:DESKTOP_RELEASE_CHANNEL}`"
          Add-Content $env:GITHUB_STEP_SUMMARY "- Application binary: `SmartSistema.exe`"
          Add-Content $env:GITHUB_STEP_SUMMARY "- Installer format: NSIS `.exe`"
          if ("${env:WINDOWS_SIGN_COMMAND_CONFIGURED}" -eq "true" -or "${env:WINDOWS_CERTIFICATE_THUMBPRINT_CONFIGURED}" -eq "true") {
            Add-Content $env:GITHUB_STEP_SUMMARY "- Authenticode signing: configured"
          } else {
            Add-Content $env:GITHUB_STEP_SUMMARY "- Authenticode signing: not configured; internal preview/pilot use only"
          }
          if ([string]::IsNullOrWhiteSpace("${env:DESKTOP_API_BASE_URL}")) {
            Add-Content $env:GITHUB_STEP_SUMMARY "- API base URL is entered by the user at runtime for self-hosted/local deployments."
          } else {
            Add-Content $env:GITHUB_STEP_SUMMARY "- API base URL is baked into the frontend at build time."
          }
          Add-Content $env:GITHUB_STEP_SUMMARY "- Build output:"
          Get-ChildItem $artifactDir -Filter "*.exe" | ForEach-Object {
            $sizeMb = [Math]::Round($_.Length / 1MB, 2)
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash
            Add-Content $env:GITHUB_STEP_SUMMARY "  - `$($_.Name)` (${sizeMb} MB, SHA-256 `$hash`)"
          }

      - name: Upload Windows desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartsistema-windows-installer-${{ env.DESKTOP_RELEASE_CHANNEL }}-${{ github.run_number }}
          if-no-files-found: error
          path: dist/windows-installer/*.exe
